<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNAKE — Broken Reality</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00ff41;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 15px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .score-board span {
            text-shadow: 0 0 5px #00ff41;
        }

        .pause-indicator {
            color: #ffcc00;
            font-size: 0.9rem;
            height: 20px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #ffcc00;
        }

        canvas {
            border: 2px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3), inset 0 0 15px rgba(0, 255, 65, 0.05);
            display: block;
            margin: 0 auto;
        }

        .controls-hint {
            margin-top: 15px;
            color: #333;
            font-size: 0.8rem;
        }

        /* Start / Game Over overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-content {
            text-align: center;
        }

        .overlay-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff41;
        }

        .overlay-content .final-score {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .overlay-content .new-record {
            font-size: 1.2rem;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            margin-bottom: 20px;
            height: 30px;
        }

        .overlay-content button {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            padding: 12px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
        }

        .overlay-content button:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
        }

        /* Mobile controls */
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 5px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 8px;
        }

        .mobile-controls button:active {
            background: rgba(0, 255, 65, 0.3);
        }

        .mobile-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            canvas {
                width: 340px !important;
                height: 340px !important;
            }
            .mobile-controls { display: block; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>S N A K E</h1>
        <div class="subtitle">// broken reality loading...</div>
        <div class="score-board">
            <span>SCORE: <span id="score">0</span></span>
            <span>BEST: <span id="best">0</span></span>
        </div>
        <div class="pause-indicator" id="pauseText"></div>
        <canvas id="game" width="400" height="400"></canvas>
        <div class="controls-hint">WASD / Arrows | SPACE = pause</div>

        <!-- Mobile controls -->
        <div class="mobile-controls">
            <div class="mobile-row">
                <button ontouchstart="setDir(0,-1)">&#9650;</button>
            </div>
            <div class="mobile-row">
                <button ontouchstart="setDir(-1,0)">&#9664;</button>
                <button ontouchstart="setDir(0,1)">&#9660;</button>
                <button ontouchstart="setDir(1,0)">&#9654;</button>
            </div>
        </div>
    </div>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>S N A K E</h2>
            <p style="color:#555; margin-bottom:30px;">broken reality edition</p>
            <button onclick="startGame()">START</button>
        </div>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>GAME OVER</h2>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="new-record" id="newRecord"></div>
            <button onclick="startGame()">RETRY</button>
        </div>
    </div>

    <script>
        // === Canvas setup ===
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const CELL = 20;
        const COLS = canvas.width / CELL;
        const ROWS = canvas.height / CELL;

        // === Game state ===
        let snake, dir, nextDir, food, score, bestScore, gameLoop, speed;
        let paused = false;
        let particles = [];
        let eating = false;
        let eatingTimer = 0;

        // Load best score
        bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
        document.getElementById('best').textContent = bestScore;

        // === Particles (food eat effect) ===
        function spawnParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                particles.push({
                    x: x * CELL + CELL / 2,
                    y: y * CELL + CELL / 2,
                    vx: Math.cos(angle) * 2.5,
                    vy: Math.sin(angle) * 2.5,
                    life: 15,
                    maxLife: 15
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.fillStyle = `rgba(255, 0, 64, ${alpha})`;
                ctx.shadowColor = '#ff0040';
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2 * alpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // === Init / Start ===
        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('pauseText').textContent = '';
            paused = false;

            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            speed = 120;
            particles = [];
            document.getElementById('score').textContent = score;

            spawnFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
        }

        // === Spawn food ===
        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        // === Toggle pause ===
        function togglePause() {
            if (!gameLoop && !paused) return;
            paused = !paused;
            if (paused) {
                clearInterval(gameLoop);
                gameLoop = null;
                document.getElementById('pauseText').textContent = '[ PAUSED ]';
                drawPauseOverlay();
            } else {
                document.getElementById('pauseText').textContent = '';
                gameLoop = setInterval(tick, speed);
            }
        }

        function drawPauseOverlay() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = '24px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#00ff41';
            ctx.shadowBlur = 10;
            ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;
        }

        // === Main tick ===
        function tick() {
            dir = { ...nextDir };

            const head = {
                x: snake[0].x + dir.x,
                y: snake[0].y + dir.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                return gameOver();
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Check food
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').textContent = score;
                eating = true;
                eatingTimer = 5;

                spawnParticles(food.x, food.y);

                // Speed up
                if (speed > 60) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                }

                spawnFood();
            } else {
                snake.pop();
            }

            if (eatingTimer > 0) eatingTimer--;
            else eating = false;

            updateParticles();
            draw();
        }

        // === Drawing ===
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(0, 255, 65, 0.03)';
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
                }
            }

            // Draw food (pulsing)
            const pulse = 1 + Math.sin(Date.now() / 150) * 0.15;
            const foodRadius = (CELL / 2 - 2) * pulse;
            ctx.fillStyle = '#ff0040';
            ctx.shadowColor = '#ff0040';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL + CELL / 2,
                food.y * CELL + CELL / 2,
                foodRadius,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake body (rounded segments)
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const brightness = 1 - (i / snake.length) * 0.6;
                const g = Math.floor(255 * brightness);
                const b = Math.floor(65 * brightness);

                if (i === 0) {
                    // Head — slightly larger with glow
                    ctx.shadowColor = '#00ff41';
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = `rgb(0, ${g}, ${b})`;

                    const hx = seg.x * CELL;
                    const hy = seg.y * CELL;
                    roundRect(ctx, hx + 0.5, hy + 0.5, CELL - 1, CELL - 1, 5);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Draw eyes
                    drawEyes(seg, dir);
                } else {
                    // Body segments
                    ctx.fillStyle = `rgb(0, ${g}, ${b})`;
                    const sx = seg.x * CELL;
                    const sy = seg.y * CELL;
                    roundRect(ctx, sx + 1.5, sy + 1.5, CELL - 3, CELL - 3, 4);
                    ctx.fill();
                }
            }

            // Draw particles
            drawParticles();
        }

        // === Draw snake eyes ===
        function drawEyes(head, direction) {
            const cx = head.x * CELL + CELL / 2;
            const cy = head.y * CELL + CELL / 2;

            let eye1, eye2;

            if (direction.x === 1) { // right
                eye1 = { x: cx + 4, y: cy - 4 };
                eye2 = { x: cx + 4, y: cy + 4 };
            } else if (direction.x === -1) { // left
                eye1 = { x: cx - 4, y: cy - 4 };
                eye2 = { x: cx - 4, y: cy + 4 };
            } else if (direction.y === -1) { // up
                eye1 = { x: cx - 4, y: cy - 4 };
                eye2 = { x: cx + 4, y: cy - 4 };
            } else { // down
                eye1 = { x: cx - 4, y: cy + 4 };
                eye2 = { x: cx + 4, y: cy + 4 };
            }

            // White of eye
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(eye1.x, eye1.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eye2.x, eye2.y, 3, 0, Math.PI * 2);
            ctx.fill();

            // Pupil
            ctx.fillStyle = '#0a0a0a';
            ctx.beginPath();
            ctx.arc(eye1.x + direction.x, eye1.y + direction.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eye2.x + direction.x, eye2.y + direction.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // === Rounded rectangle helper ===
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // === Game Over ===
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;

            let isNewRecord = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBest', bestScore);
                document.getElementById('best').textContent = bestScore;
                isNewRecord = true;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('newRecord').textContent = isNewRecord ? 'NEW RECORD!' : '';
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // === Controls ===
        function setDir(x, y) {
            if (dir.x === -x && dir.y === -y) return;
            nextDir = { x, y };
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':    case 'w': case 'W': setDir(0, -1); break;
                case 'ArrowDown':  case 's': case 'S': setDir(0, 1);  break;
                case 'ArrowLeft':  case 'a': case 'A': setDir(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': setDir(1, 0);  break;
                case ' ':
                    if (!document.getElementById('startOverlay').classList.contains('hidden')) return;
                    if (!document.getElementById('gameOverOverlay').classList.contains('hidden')) return;
                    togglePause();
                    break;
            }

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });

        // === Swipe controls for mobile ===
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const minSwipe = 30;

            if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        });

        // Initial draw
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
