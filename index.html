<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SNAKE — Broken Reality</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #00ff41;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
            letter-spacing: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 15px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .score-board span {
            text-shadow: 0 0 5px #00ff41;
        }

        .level-indicator {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
            height: 18px;
        }

        .pause-indicator {
            color: #ffcc00;
            font-size: 0.9rem;
            height: 20px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px #ffcc00;
        }

        canvas {
            border: 2px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3), inset 0 0 15px rgba(0, 255, 65, 0.05);
            display: block;
            margin: 0 auto;
        }

        .controls-hint {
            margin-top: 15px;
            color: #333;
            font-size: 0.8rem;
        }

        /* Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            overflow-y: auto;
            padding: 20px 0;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-content {
            text-align: center;
        }

        .overlay-content h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff41;
        }

        .overlay-content .final-score {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .overlay-content .new-record {
            font-size: 1.2rem;
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
            margin-bottom: 20px;
            height: 30px;
        }

        .overlay-content button,
        .overlay-content .btn {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            padding: 12px 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s;
            display: inline-block;
        }

        .overlay-content button:hover,
        .overlay-content .btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            box-shadow: 0 0 20px #00ff41;
        }

        /* Settings section on start screen */
        .settings-section {
            margin: 25px 0;
        }

        .settings-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Level selector */
        .level-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .level-btn {
            background: transparent;
            border: 2px solid #333;
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            padding: 8px 18px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .level-btn:hover {
            border-color: #00ff41;
            color: #00ff41;
        }

        .level-btn.active {
            border-color: #00ff41;
            color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        /* Color selector */
        .color-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid #333;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .color-btn:hover {
            transform: scale(1.15);
        }

        .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 12px currentColor;
            transform: scale(1.15);
        }

        /* Donate button */
        .btn-donate {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 14px;
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            border: 2px solid #ffd700;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .btn-donate:hover {
            background: #ffd700;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }

        /* Mobile controls */
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 5px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid #00ff41;
            color: #00ff41;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 8px;
        }

        .mobile-controls button:active {
            background: rgba(0, 255, 65, 0.3);
        }

        .mobile-row {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .overlay-content h2 { font-size: 2rem; }
            canvas {
                width: 340px !important;
                height: 340px !important;
            }
            .mobile-controls { display: block; }
            .level-btn { font-size: 0.7rem; padding: 6px 12px; }
            .color-btn { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>S N A K E</h1>
        <div class="subtitle">// broken reality loading...</div>
        <div class="score-board">
            <span>SCORE: <span id="score">0</span></span>
            <span>LEVEL: <span id="levelDisplay">1</span></span>
            <span>BEST: <span id="best">0</span></span>
        </div>
        <div class="level-indicator" id="levelName"></div>
        <div class="pause-indicator" id="pauseText"></div>
        <canvas id="game" width="400" height="400"></canvas>
        <div class="controls-hint">WASD / Arrows | SPACE = pause</div>

        <!-- Mobile controls -->
        <div class="mobile-controls">
            <div class="mobile-row">
                <button ontouchstart="setDir(0,-1)">&#9650;</button>
            </div>
            <div class="mobile-row">
                <button ontouchstart="setDir(-1,0)">&#9664;</button>
                <button ontouchstart="setDir(0,1)">&#9660;</button>
                <button ontouchstart="setDir(1,0)">&#9654;</button>
            </div>
        </div>
    </div>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h2>S N A K E</h2>
            <p style="color:#555; margin-bottom:10px;">broken reality edition</p>

            <div class="settings-section">
                <div class="settings-label">Difficulty</div>
                <div class="level-selector">
                    <button class="level-btn" data-level="easy" onclick="selectLevel('easy')">Easy</button>
                    <button class="level-btn active" data-level="normal" onclick="selectLevel('normal')">Normal</button>
                    <button class="level-btn" data-level="hard" onclick="selectLevel('hard')">Hard</button>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-label">Snake Color</div>
                <div class="color-selector" id="colorSelector">
                    <div class="color-btn active" data-color="green" style="background: #00ff41;" onclick="selectColor('green')"></div>
                    <div class="color-btn" data-color="cyan" style="background: #00e5ff;" onclick="selectColor('cyan')"></div>
                    <div class="color-btn" data-color="purple" style="background: #bf00ff;" onclick="selectColor('purple')"></div>
                    <div class="color-btn" data-color="orange" style="background: #ff8800;" onclick="selectColor('orange')"></div>
                    <div class="color-btn" data-color="pink" style="background: #ff0080;" onclick="selectColor('pink')"></div>
                    <div class="color-btn" data-color="gold" style="background: #ffd700;" onclick="selectColor('gold')"></div>
                    <div class="color-btn" data-color="white" style="background: #ffffff;" onclick="selectColor('white')"></div>
                </div>
            </div>

            <button onclick="startGame()">START</button>
            <br>
            <a href="https://send.monobank.ua/jar/7kcin57bo4" target="_blank" rel="noopener noreferrer" class="btn-donate" onclick="event.stopPropagation()">☕ Закинути на каву</a>
        </div>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>GAME OVER</h2>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="new-record" id="newRecord"></div>
            <button onclick="startGame()">RETRY</button>
            <div style="margin-top: 15px;">
                <button onclick="showMenu()" style="font-size: 0.8rem; padding: 8px 20px; letter-spacing: 1px;">MENU</button>
            </div>
            <a href="https://send.monobank.ua/jar/7kcin57bo4" target="_blank" rel="noopener noreferrer" class="btn-donate" onclick="event.stopPropagation()">☕ Закинути на каву</a>
        </div>
    </div>

    <script>
        // === Canvas setup ===
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const CELL = 20;
        const COLS = canvas.width / CELL;
        const ROWS = canvas.height / CELL;

        // === Difficulty levels ===
        const LEVELS = {
            easy:   { startSpeed: 200, minSpeed: 120, speedStep: 1, name: 'Easy',   levelUpEvery: 8 },
            normal: { startSpeed: 150, minSpeed: 80,  speedStep: 2, name: 'Normal', levelUpEvery: 6 },
            hard:   { startSpeed: 100, minSpeed: 50,  speedStep: 3, name: 'Hard',   levelUpEvery: 4 }
        };

        // === Snake color themes ===
        const COLORS = {
            green:  { r: 0,   g: 255, b: 65,  hex: '#00ff41' },
            cyan:   { r: 0,   g: 229, b: 255, hex: '#00e5ff' },
            purple: { r: 191, g: 0,   b: 255, hex: '#bf00ff' },
            orange: { r: 255, g: 136, b: 0,   hex: '#ff8800' },
            pink:   { r: 255, g: 0,   b: 128, hex: '#ff0080' },
            gold:   { r: 255, g: 215, b: 0,   hex: '#ffd700' },
            white:  { r: 220, g: 220, b: 220, hex: '#dcdcdc' }
        };

        // === Game state ===
        let snake, dir, nextDir, food, score, bestScore, gameLoop, speed;
        let paused = false;
        let particles = [];
        let currentLevel = 'normal';
        let currentColor = 'green';
        let gameLevel = 1;
        let foodEaten = 0;
        let walls = [];

        // Load saved settings
        bestScore = parseInt(localStorage.getItem('snakeBest') || '0');
        currentLevel = localStorage.getItem('snakeLevel') || 'normal';
        currentColor = localStorage.getItem('snakeColor') || 'green';
        document.getElementById('best').textContent = bestScore;

        // Apply saved settings to UI
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        const savedLevelBtn = document.querySelector(`.level-btn[data-level="${currentLevel}"]`);
        if (savedLevelBtn) savedLevelBtn.classList.add('active');

        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        const savedColorBtn = document.querySelector(`.color-btn[data-color="${currentColor}"]`);
        if (savedColorBtn) savedColorBtn.classList.add('active');

        // === UI Functions ===
        function selectLevel(level) {
            currentLevel = level;
            localStorage.setItem('snakeLevel', level);
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.level-btn[data-level="${level}"]`).classList.add('active');
        }

        function selectColor(color) {
            currentColor = color;
            localStorage.setItem('snakeColor', color);
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.color-btn[data-color="${color}"]`).classList.add('active');
        }

        function showMenu() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('startOverlay').classList.remove('hidden');
        }

        // === Particles ===
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                particles.push({
                    x: x * CELL + CELL / 2,
                    y: y * CELL + CELL / 2,
                    vx: Math.cos(angle) * 2.5,
                    vy: Math.sin(angle) * 2.5,
                    life: 15,
                    maxLife: 15,
                    color: color || '#ff0040'
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5 * alpha, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            });
        }

        // === Generate walls for levels ===
        function generateWalls(level) {
            walls = [];
            if (level < 2) return;

            // Level 2: border pillars
            if (level >= 2) {
                // 4 small blocks in corners area
                const positions = [
                    { x: 5, y: 5 }, { x: 14, y: 5 },
                    { x: 5, y: 14 }, { x: 14, y: 14 }
                ];
                positions.forEach(p => walls.push(p));
            }

            // Level 3: cross-shaped obstacles
            if (level >= 3) {
                for (let i = 7; i <= 12; i++) {
                    walls.push({ x: i, y: 3 });
                    walls.push({ x: i, y: 16 });
                }
            }

            // Level 4: side walls
            if (level >= 4) {
                for (let i = 6; i <= 13; i++) {
                    walls.push({ x: 3, y: i });
                    walls.push({ x: 16, y: i });
                }
            }

            // Level 5+: maze-like extra walls
            if (level >= 5) {
                for (let i = 8; i <= 11; i++) {
                    walls.push({ x: i, y: 8 });
                    walls.push({ x: i, y: 11 });
                }
            }
        }

        // === Init / Start ===
        function startGame() {
            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('pauseText').textContent = '';
            paused = false;

            const lvl = LEVELS[currentLevel];

            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            score = 0;
            gameLevel = 1;
            foodEaten = 0;
            speed = lvl.startSpeed;
            particles = [];

            document.getElementById('score').textContent = score;
            document.getElementById('levelDisplay').textContent = gameLevel;
            document.getElementById('levelName').textContent = lvl.name;

            generateWalls(gameLevel);
            spawnFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(tick, speed);
        }

        // === Spawn food ===
        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (
                snake.some(s => s.x === pos.x && s.y === pos.y) ||
                walls.some(w => w.x === pos.x && w.y === pos.y)
            );
            food = pos;
        }

        // === Toggle pause ===
        function togglePause() {
            if (!gameLoop && !paused) return;
            paused = !paused;
            if (paused) {
                clearInterval(gameLoop);
                gameLoop = null;
                document.getElementById('pauseText').textContent = '[ PAUSED ]';
                drawPauseOverlay();
            } else {
                document.getElementById('pauseText').textContent = '';
                gameLoop = setInterval(tick, speed);
            }
        }

        function drawPauseOverlay() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = COLORS[currentColor].hex;
            ctx.font = '24px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowColor = COLORS[currentColor].hex;
            ctx.shadowBlur = 10;
            ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;
        }

        // === Level up ===
        function levelUp() {
            const lvl = LEVELS[currentLevel];
            gameLevel++;
            document.getElementById('levelDisplay').textContent = gameLevel;

            // Flash effect
            spawnParticles(10, 10, COLORS[currentColor].hex);
            spawnParticles(5, 5, '#ffcc00');
            spawnParticles(15, 15, '#ffcc00');

            generateWalls(gameLevel);

            // Make sure snake and food are not on walls
            if (walls.some(w => snake.some(s => s.x === w.x && s.y === w.y))) {
                // If snake overlaps wall, remove those wall segments
                walls = walls.filter(w => !snake.some(s => s.x === w.x && s.y === w.y));
            }
            if (walls.some(w => w.x === food.x && w.y === food.y)) {
                spawnFood();
            }
        }

        // === Main tick ===
        function tick() {
            dir = { ...nextDir };

            const head = {
                x: snake[0].x + dir.x,
                y: snake[0].y + dir.y
            };

            // Wall collision (borders)
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                return gameOver();
            }

            // Wall collision (obstacles)
            if (walls.some(w => w.x === head.x && w.y === head.y)) {
                return gameOver();
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            // Check food
            if (head.x === food.x && head.y === food.y) {
                score++;
                foodEaten++;
                document.getElementById('score').textContent = score;

                spawnParticles(food.x, food.y, '#ff0040');

                const lvl = LEVELS[currentLevel];

                // Speed up slightly
                if (speed > lvl.minSpeed) {
                    speed -= lvl.speedStep;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, speed);
                }

                // Level up check
                if (foodEaten >= lvl.levelUpEvery && gameLevel < 5) {
                    foodEaten = 0;
                    levelUp();
                }

                spawnFood();
            } else {
                snake.pop();
            }

            updateParticles();
            draw();
        }

        // === Drawing ===
        function draw() {
            const clr = COLORS[currentColor];

            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = `rgba(${clr.r}, ${clr.g}, ${clr.b}, 0.03)`;
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    ctx.strokeRect(x * CELL, y * CELL, CELL, CELL);
                }
            }

            // Draw walls
            walls.forEach(w => {
                ctx.fillStyle = '#444';
                ctx.shadowColor = '#666';
                ctx.shadowBlur = 4;
                roundRect(ctx, w.x * CELL + 1, w.y * CELL + 1, CELL - 2, CELL - 2, 3);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Wall inner pattern
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 1;
                ctx.strokeRect(w.x * CELL + 4, w.y * CELL + 4, CELL - 8, CELL - 8);
            });

            // Draw food (pulsing)
            const pulse = 1 + Math.sin(Date.now() / 150) * 0.15;
            const foodRadius = (CELL / 2 - 2) * pulse;
            ctx.fillStyle = '#ff0040';
            ctx.shadowColor = '#ff0040';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL + CELL / 2,
                food.y * CELL + CELL / 2,
                foodRadius,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            for (let i = snake.length - 1; i >= 0; i--) {
                const seg = snake[i];
                const brightness = 1 - (i / snake.length) * 0.6;
                const r = Math.floor(clr.r * brightness);
                const g = Math.floor(clr.g * brightness);
                const b = Math.floor(clr.b * brightness);

                if (i === 0) {
                    // Head
                    ctx.shadowColor = clr.hex;
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

                    const hx = seg.x * CELL;
                    const hy = seg.y * CELL;
                    roundRect(ctx, hx + 0.5, hy + 0.5, CELL - 1, CELL - 1, 5);
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    drawEyes(seg, dir);
                } else {
                    // Body
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    const sx = seg.x * CELL;
                    const sy = seg.y * CELL;
                    roundRect(ctx, sx + 1.5, sy + 1.5, CELL - 3, CELL - 3, 4);
                    ctx.fill();
                }
            }

            drawParticles();
        }

        // === Draw snake eyes ===
        function drawEyes(head, direction) {
            const cx = head.x * CELL + CELL / 2;
            const cy = head.y * CELL + CELL / 2;

            let eye1, eye2;

            if (direction.x === 1) {
                eye1 = { x: cx + 4, y: cy - 4 };
                eye2 = { x: cx + 4, y: cy + 4 };
            } else if (direction.x === -1) {
                eye1 = { x: cx - 4, y: cy - 4 };
                eye2 = { x: cx - 4, y: cy + 4 };
            } else if (direction.y === -1) {
                eye1 = { x: cx - 4, y: cy - 4 };
                eye2 = { x: cx + 4, y: cy - 4 };
            } else {
                eye1 = { x: cx - 4, y: cy + 4 };
                eye2 = { x: cx + 4, y: cy + 4 };
            }

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(eye1.x, eye1.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eye2.x, eye2.y, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#0a0a0a';
            ctx.beginPath();
            ctx.arc(eye1.x + direction.x, eye1.y + direction.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eye2.x + direction.x, eye2.y + direction.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // === Rounded rectangle ===
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // === Game Over ===
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;

            let isNewRecord = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('snakeBest', bestScore);
                document.getElementById('best').textContent = bestScore;
                isNewRecord = true;
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('newRecord').textContent = isNewRecord ? 'NEW RECORD!' : '';
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // === Controls ===
        function setDir(x, y) {
            if (dir.x === -x && dir.y === -y) return;
            nextDir = { x, y };
        }

        document.addEventListener('keydown', (e) => {
            // Use e.code for WASD so it works on any keyboard layout (UA, EN, etc.)
            const code = e.code;
            const key = e.key;

            if (key === 'ArrowUp'    || code === 'KeyW') { setDir(0, -1); e.preventDefault(); }
            else if (key === 'ArrowDown'  || code === 'KeyS') { setDir(0, 1);  e.preventDefault(); }
            else if (key === 'ArrowLeft'  || code === 'KeyA') { setDir(-1, 0); e.preventDefault(); }
            else if (key === 'ArrowRight' || code === 'KeyD') { setDir(1, 0);  e.preventDefault(); }
            else if (key === ' ') {
                if (!document.getElementById('startOverlay').classList.contains('hidden')) return;
                if (!document.getElementById('gameOverOverlay').classList.contains('hidden')) return;
                togglePause();
                e.preventDefault();
            }
        });

        // === Swipe controls ===
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const minSwipe = 30;

            if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                setDir(dx > 0 ? 1 : -1, 0);
            } else {
                setDir(0, dy > 0 ? 1 : -1);
            }
        });

        // Initial draw
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
